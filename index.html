<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>MineDevs</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #000000, #0a0a0a);
  color: white;
  text-align: center;
}

.topo {
  padding: 20px;
}

.badge {
  background: #1a1a1a;
  padding: 10px 20px;
  border-radius: 20px;
  display: inline-block;
}

h1 {
  letter-spacing: 8px;
  font-size: 40px;
}

.search {
  margin: 20px;
}

.search input {
  padding: 12px;
  width: 80%;
  border-radius: 20px;
  border: none;
  background: #111;
  color: white;
}

.container {
  padding: 20px;
}

.card {
  background: #0f0f0f;
  border-radius: 20px;
  padding: 20px;
  margin: 20px;
}

.btn {
  background: white;
  color: black;
  padding: 10px;
  border-radius: 20px;
  display: inline-block;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="topo">
  <div class="badge">🚀 MineDevs</div>
  <h1>MINEDEVS</h1>
</div>

<div class="search">
  <input type="text" placeholder="Pesquisar...">
</div>

<div class="container">
  <div class="card">
    <h2>HTML</h2>
    <p>Aprenda estrutura</p>
    <div class="btn">Aprender</div>
  </div>

  <div class="card">
    <h2>CSS</h2>
    <p>Estilização</p>
    <div class="btn">Aprender</div>
  </div>

  <div class="card">
    <h2>JavaScript</h2>
    <p>Lógica</p>
    <div class="btn">Aprender</div>
  </div>
</div>

</body>
</html>
