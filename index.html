<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS ACADEMY - MineDevs</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 60px 20px 20px; text-align: center; }
        
        /* Barra Superior MineDevs */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 15px 20px; background: #000; border-bottom: 1px solid #1a1a1a; font-size: 10px; font-weight: bold; box-sizing: border-box; z-index: 100; letter-spacing: 1px; }

        .container { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 24px; font-weight: 900; margin-bottom: 5px; }
        .sub-header { color: #555; font-size: 12px; margin-bottom: 30px; }

        /* Estilo dos Cards do Lobby */
        .modulo-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 25px; margin-bottom: 15px; text-align: left; }
        .tag { color: #444; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; }
        h3 { margin: 0 0 10px 0; font-size: 18px; }
        
        /* Lista de Tópicos (Aulas) */
        .lista { list-style: none; padding: 0; margin: 0 0 20px 0; color: #666; font-size: 12px; }
        .lista li::before { content: "• "; margin-right: 5px; }

        /* Botão Branco */
        .btn { 
            display: block; width: 100%; padding: 15px 0; background: #fff; color: #000; 
            text-decoration: none; font-weight: bold; border-radius: 8px; 
            text-transform: uppercase; font-size: 12px; text-align: center;
        }
        .disabled { background: #111; color: #333; pointer-events: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div>MINEDEVS</div>
        <div style="color: #444;">AULAS | COMUNIDADE</div>
    </div>

    <div class="container">
        <h1>JS ACADEMY</h1>
        <p class="sub-header">O portal oficial de aprendizado do grupo MineDevs.</p>

        <div class="modulo-card">
            <span class="tag">Módulo 01</span>
            <h3>Fundamentos JS</h3>
            <ul class="lista">
                <li>Variáveis e Tipos</li>
                <li>Operadores Lógicos</li>
                <li>Estrutura de Decisão</li>
            </ul>
            <a href="aula1.html" class="btn">ESTUDAR AGORA</a>
        </div>

        <div class="modulo-card">
            <span class="tag">Módulo 02</span>
            <h3>Dominação do DOM</h3>
            <ul class="lista">
                <li>Seletores e Eventos</li>
                <li>Manipulação de CSS</li>
            </ul>
            <a href="#" class="btn disabled">EM BREVE</a>
        </div>
    </div>

</body>
</html>
