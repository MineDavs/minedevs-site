<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS ACADEMY - MineDevs</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 80px 20px 20px; text-align: center; }
        
        /* Barra Superior */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 20px; background: #000; border-bottom: 1px solid #1a1a1a; font-size: 12px; font-weight: bold; box-sizing: border-box; z-index: 100; letter-spacing: 2px; }

        .container { max-width: 450px; margin: 0 auto; }
        h1 { font-size: 26px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
        .sub-header { color: #666; font-size: 13px; margin-bottom: 40px; }

        /* Estilo dos Cards */
        .modulo-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 15px; padding: 30px 25px; margin-bottom: 20px; text-align: left; }
        .tag { color: #444; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; }
        h3 { margin: 0 0 15px 0; font-size: 20px; font-weight: 800; }
        
        /* Lista de Tópicos */
        .lista { list-style: none; padding: 0; margin: 0 0 25px 0; color: #888; font-size: 14px; line-height: 1.8; }
        .lista li::before { content: "• "; margin-right: 8px; color: #444; }

        /* Botão Branco Grande */
        .btn { 
            display: block; width: 100%; padding: 18px 0; background: #fff; color: #000; 
            text-decoration: none; font-weight: 900; border-radius: 10px; 
            text-transform: uppercase; font-size: 14px; text-align: center; transition: 0.3s;
        }
        .disabled { background: #111; color: #333; pointer-events: none; border: 1px solid #1a1a1a; }
    </style>
</head>
<body>

    <div class="navbar">
        <div>MINEDEVS</div>
        <div style="color: #444;">AULAS | COMUNIDADE</div>
    </div>

    <div class="container">
        <h1>JS ACADEMY</h1>
        <p class="sub-header">O portal oficial de aprendizado do grupo MineDevs.</p>

        <div class="modulo-card">
            <span class="tag">Módulo 01</span>
            <h3>Fundamentos JS</h3>
            <ul class="lista">
                <li>Variáveis e Tipos</li>
                <li>Operadores Lógicos</li>
                <li>Estrutura de Decisão</li>
            </ul>
            <a href="aula1.html" class="btn">ESTUDAR AGORA</a>
        </div>

        <div class="modulo-card">
            <span class="tag">Módulo 02</span>
            <h3>Dominação do DOM</h3>
            <ul class="lista">
                <li>Seletores e Eventos</li>
                <li>Manipulação de CSS</li>
            </ul>
            <a href="#" class="btn disabled">EM BREVE</a>
        </div>
    </div>

</body>
</html>
