<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML - MineDevs</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="verificarLogin()">

<div class="container">

<h1>HTML</h1>

<div id="aula"></div>

<br>

<button onclick="voltar()" class="btn">⬅ Voltar</button>
<button onclick="proxima()" class="btn">Próximo ➜</button>

<br><br>
<a href="index.html" class="btn">Sair da aula</a>

</div>

<script src="script.js"></script>

<script>
let etapa = 0;
let aula = document.getElementById("aula");

function render() {

  if (etapa === 0) {
    aula.innerHTML = `
      <h2>O que é HTML?</h2>
      <p>HTML é a linguagem que cria a estrutura dos sites.</p>
      <p>Ela organiza textos, imagens e elementos.</p>
    `;
  }

  else if (etapa === 1) {
    aula.innerHTML = `
      <h2>Tags</h2>
      <p>HTML usa "tags" para funcionar.</p>
      <pre>&lt;h1&gt;Título&lt;/h1&gt;</pre>
      <p>A maioria abre e fecha.</p>
    `;
  }

  else if (etapa === 2) {
    aula.innerHTML = `
      <h2>Estrutura básica</h2>
      <pre>
&lt;html&gt;
&lt;head&gt;&lt;/head&gt;
&lt;body&gt;
  Conteúdo
&lt;/body&gt;
&lt;/html&gt;
      </pre>
    `;
  }

  else if (etapa === 3) {
    aula.innerHTML = `
      <h2>Principais tags</h2>
      <ul>
        <li>&lt;h1&gt; Título</li>
        <li>&lt;p&gt; Parágrafo</li>
        <li>&lt;a&gt; Link</li>
        <li>&lt;img&gt; Imagem</li>
      </ul>
    `;
  }

  else if (etapa === 4) {
    aula.innerHTML = `
      <h2>Final 🎉</h2>
      <p>Você aprendeu o básico de HTML 😎</p>
    `;
    salvar();
  }
}

function proxima() {
  if (etapa < 4) {
    etapa++;
    render();
  }
}

function voltar() {
  if (etapa > 0) {
    etapa--;
    render();
  }
}
